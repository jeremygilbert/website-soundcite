    <div id="app" class="container">
        <div style="display:none;">
          <div id="popup">
          </div>
        </div>
        <div class="row" style="margin:0 auto;">
          <div id="keywords" class="span2 first" style="font-size: 80%; visibility: hidden;">&nbsp;</div>
          <div class="span8" style="text-align: center;">
            <div class="row">
              <div class="span8">
                <h1>Hash#Tagger</h1>
                <form id="alchemy-key-form" style="display:none;" class="well span6">
                    <input id="alchemy-key-input" type="text" placeholder="Enter your Alchemy API key" />
                    <br/>
                    <button class="btn">Go</button>
                </form>
                <form id="tweet-form" class="well span6" style="display:none;margin-left:75px;">
                  <textarea id="tweet-box" type="textarea" class="input-xlarge span6" rows="5">Hash#Tagger recommends hashtags for linked stories. Compose a Tweet here.</textarea>
                  <br/>
                  <!-- <input type="button" id="get-hashtags" class="btn" value="#" /> -->
                  <!-- <input type="button" id="tweet" class="btn" value="Tweet" /> -->
                  <div style="float: left;margin-left:15px">
                    <button id="get-hashtags" class="btn" style="padding:0; width:40px; height: 40px; font-size: 200%; color: #4099FF;" title="Suggest Hashtags"><img src="images/twitter-hash-med-bgs.png" alt="Suggest Hashtags"></button>
                    <button id="tweet" class="btn" style="padding:0; width:40px; height: 40px;" title="Send Tweet"><img src="images/twitter-bird-med-bgs.png" alt="Send Tweet"></button>
                  </div>
                  <span id="charcount" style="color:#999 !important; float:right; font-size: 150%; position: relative; top:.25em;right:2px;text-align:right;">140</span>
                </form>
              </div>
              <div id="hashtagger" class="well span6" >
                <div class="progress">
                  <div id="progress-bar" class="bar" style="width: 0%;"></div>
                </div>
              </div>
            </div>
          </div> <!-- .span6 -->
          <div class="span2" style="font-size: 80%;">&nbsp;</div> <!-- .row -->
